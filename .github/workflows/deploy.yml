name: Deploy to GitHub Pages

# 触发条件：推送 main 分支，或手动在 Actions 页面点 Run
on:
  push:
    branches: [main]
  workflow_dispatch:

# 给工作流赋予部署 Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，避免互相覆盖
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 第 1 步：构建（在 GitHub 的服务器上装依赖 + 打包）
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 安装依赖
        run: npm install

      - name: 构建静态网站
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 第 2 步：把构建产物发布到 GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
